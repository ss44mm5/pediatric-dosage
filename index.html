<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>兒科藥物劑量計算器 2025</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0a1520"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="兒科劑量"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1520;font-family:'Courier New',monospace;color:#8aa8bc;min-height:100vh;padding:12px}
h1{font-size:22px;font-weight:700;background:linear-gradient(90deg,#7ec8ff,#fff,#32a0f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header{text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(50,160,240,0.15)}
.hosp{font-size:13px;letter-spacing:6px;color:#32a0f0;margin-bottom:5px}
.sub{font-size:13px;color:#304050;margin-top:5px}
.dev{font-size:15px;color:#4a7a9a;margin-top:6px;letter-spacing:2px;font-weight:600}
.thanks{font-size:13px;color:#3a6a7a;margin-top:4px}
.card{background:rgba(15,30,50,0.8);border:1px solid rgba(50,100,150,0.3);border-radius:10px;padding:14px;margin-bottom:12px}
.sec{font-size:13px;letter-spacing:3px;color:#406080;margin-bottom:10px;text-transform:uppercase}
.ig{margin-bottom:10px}
.ig label{font-size:13px;color:#406080;letter-spacing:1.5px;display:block;margin-bottom:4px;text-transform:uppercase}
input{background:rgba(20,50,80,0.5);border:1px solid rgba(50,100,150,0.4);color:#c0d8e8;padding:9px 10px;border-radius:6px;font-family:inherit;font-size:15px;width:100%;outline:none}
input:focus{border-color:#32a0f0;background:rgba(20,50,80,0.8)}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:10px;border:1px solid rgba(50,100,150,0.3);border-radius:8px;background:rgba(15,30,50,0.6);color:#406080;font-family:inherit;font-size:14px;cursor:pointer}
.tab.on{background:rgba(50,160,240,0.12);border-color:rgba(50,160,240,0.5);color:#32a0f0}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-top:8px}
.dbtn{background:rgba(20,40,60,0.5);border:1px solid rgba(50,100,150,0.25);color:#7a9ab0;padding:8px 10px;border-radius:7px;font-family:inherit;font-size:14px;cursor:pointer;text-align:left;line-height:1.35;width:100%}
.dbtn:active,.dbtn.on{background:rgba(50,160,240,0.12);border-color:rgba(50,160,240,0.6);color:#7ec8ff}
.dcat{font-size:12px;color:#304050;margin-bottom:2px}
.dbtn.on .dcat{color:#32a0f0}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{padding:4px 10px;border-radius:10px;font-size:13px;border:1px solid rgba(50,100,150,0.3);color:#406080;background:rgba(15,30,50,0.5);cursor:pointer;font-family:inherit}
.tag.on{background:rgba(50,160,240,0.15);border-color:rgba(50,160,240,0.5);color:#32a0f0}
.cbtn{width:100%;padding:12px;background:rgba(50,160,240,0.12);border:1px solid rgba(50,160,240,0.4);color:#32a0f0;font-family:inherit;font-size:16px;border-radius:8px;cursor:pointer;letter-spacing:2px;margin-top:4px}
.cbtn:disabled{opacity:0.3;cursor:not-allowed}
.rcard{background:rgba(15,30,50,0.8);border:1px solid rgba(50,160,240,0.4);border-radius:10px;padding:14px;margin-top:14px}
.rrow{border:1px solid rgba(50,100,150,0.3);border-radius:8px;padding:12px;margin-bottom:8px;background:rgba(20,40,60,0.4)}
.rrow.men{border-color:rgba(255,100,100,0.35);background:rgba(255,60,60,0.04)}
.rrow.ld{border-color:rgba(255,180,0,0.35);background:rgba(255,160,0,0.04)}
.rh{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.rlbl{font-size:13px;letter-spacing:1.5px;font-weight:600;text-transform:uppercase;flex:1;color:#32a0f0}
.rlbl.men{color:#ff8080}
.rlbl.ld{color:#ffcc60}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:12px;font-weight:700;margin-right:3px;color:#c8e8ff}
.biv{background:#1a6ea8}.bim{background:#4a7a28}.bpo{background:#7a4a98}.bivd{background:#0e5a8a}
.bmen{font-size:11px;padding:1px 6px;background:rgba(255,80,80,0.2);color:#ff8080;border-radius:8px;font-weight:700}
.bld{font-size:11px;padding:1px 6px;background:rgba(255,160,0,0.2);color:#ffcc60;border-radius:8px;font-weight:700}
.dgr{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.di label{font-size:12px;color:#406080;display:block;margin-bottom:2px}
.di .v{font-size:14px;color:#8aa8bc;line-height:1.35}
.di.hl .v{font-size:16px;color:#7ec8ff;font-weight:700}
.warn{font-size:13px;color:#6a8a60;background:rgba(50,100,40,0.1);border:1px solid rgba(80,140,60,0.2);border-radius:5px;padding:5px 8px;margin-top:8px}
.rf{font-size:12px;color:#203040;margin-top:8px}
.pill{padding:7px 14px;border-radius:20px;border:1px solid rgba(50,100,150,0.3);background:rgba(15,30,50,0.5);color:#406080;font-family:inherit;font-size:14px;cursor:pointer}
.pill.on{background:rgba(50,160,240,0.15);border-color:rgba(50,160,240,0.5);color:#32a0f0}
.pills{display:flex;flex-wrap:wrap;gap:7px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px}
.cc{border:1px solid rgba(50,100,150,0.3);background:rgba(15,30,50,0.6);color:#406080;padding:8px 10px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;text-align:center}
.cc.on{background:rgba(50,160,240,0.15);border-color:rgba(50,160,240,0.6);color:#7ec8ff}
.cc .nw{font-size:11px;color:#ffaa60;display:block;margin-top:2px}
.pbtns{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.pbtn{padding:6px 14px;border-radius:14px;border:1px solid rgba(50,100,150,0.3);background:rgba(15,30,50,0.5);color:#406080;font-family:inherit;font-size:14px;cursor:pointer}
.pbtn:active{border-color:rgba(50,160,240,0.5);color:#32a0f0}
.cr{background:rgba(20,60,40,0.2);border:1px solid rgba(50,160,100,0.25);border-radius:8px;padding:12px;margin-top:12px}
.crg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:10px}
.cri label{font-size:12px;color:#406080;display:block;margin-bottom:2px}
.cri .v{font-size:15px;color:#7ec8ff;font-weight:700}
.step{font-size:13px;color:#607080;padding:4px 0;border-bottom:1px solid rgba(50,80,100,0.15)}
.step:last-child{border-bottom:none}
.step b{color:#32a0f0;margin-right:6px}
.neo{font-size:12px;padding:3px 8px;background:rgba(255,140,0,0.1);border:1px solid rgba(255,140,0,0.3);border-radius:10px;color:#ffaa60;margin-left:8px}
.nores{color:#304050;font-size:14px;text-align:center;padding:20px}
.ci{font-size:14px;font-weight:700;color:#7ec8ff;margin-bottom:4px}
.cs{font-size:13px;color:#506878;margin-bottom:12px}
.cl{font-size:13px;color:#ffcc80;padding:6px 10px;background:rgba(255,168,0,0.05);border:1px solid rgba(255,168,0,0.2);border-radius:6px;margin-bottom:12px}
@media(max-width:480px){.dgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const CIVD_DATA = {

    neoMaxConc: 200,
    note: null,
  },
  fentanyl_civd: {
    name: "Fentanyl CIVD", drug_info: "500 mcg/vial，50 mcg/mL（10 mL/vial）",
    loading: null,
    unit: "mcg/kg/hr", unitIsHr: true,
    drugMgPerUnit: 0.5, drugMlPerUnit: 10, unitLabel: "vial",  // 0.5 mg = 500 mcg per vial
    concOptions: [1, 2, 2.5, 5, 10],
    dLow: 0.5, dHigh: 3.0,
    neoMaxConc: null,
    note: "ECMO 劑量：1–5 mcg/kg/hr",
    indications: { nicu: "NICU / PICU 呼吸器鎮靜", ecmo: "ECMO" },
    ecmoDLow: 1, ecmoDHigh: 5,
  },
  midazolam_civd: {
    name: "Midazolam CIVD", drug_info: "5 mg/mL/amp（1 mL/amp = 5 mg/amp）",
    loading: "新生兒 LD: 0.1 mg/kg；PICU LD: 0.2 mg/kg",
    unit: "mcg/kg/min", unitIsHr: false,

  },
  alprostadil: {
    name: "Alprostadil（PGE1）", drug_info: "Prostin VR 500 mcg/mL（0.5 mg/mL），1 mL/vial",

    neoMaxConc: null,
    note: null,
  },
  lidocaine: {
    name: "Lidocaine 2%", drug_info: "100 mg/amp，20 mg/mL（5 mL/amp）",
    loading: null,
    unit: "mcg/kg/min", unitIsHr: false,
    drugMgPerUnit: 100, drugMlPerUnit: 5, unitLabel: "amp",
    concOptions: [8000, 4000, 2000],

    neoMaxConc: null,
    note: null,
  },

// ─── 一般藥物資料庫 ──────────────────────────────────────────────────────────
const DRUGS = {
  ampicillin_neo: {
    name: "Ampicillin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let gen_dose, gen_freq, bw_note;
      // Nelson dosing by BW
      if (bw < 1) { gen_dose = 50; gen_freq = pna <= 14 ? "Q12H" : "Q8H"; bw_note = "BW < 1 kg"; }
      else if (bw <= 2) { gen_dose = 50; gen_freq = pna <= 7 ? "Q12H" : "Q8H"; bw_note = "BW 1–2 kg"; }
      else { gen_dose = 50; gen_freq = pna <= 7 ? "Q8H" : "Q6H"; bw_note = "BW > 2 kg"; }
      // Meningitis by GA
      const men_freq_early = ga <= 34 ? "Q8H" : "Q8H";
      const men_freq_late  = ga <= 34 ? "Q6H（75 mg/kg）" : "Q6H（75 mg/kg）";
      return [
        { label: "一般感染", dose_per_kg: `${gen_dose} mg/kg`, total: `${(gen_dose*bw).toFixed(1)} mg`, freq: gen_freq, route: "IV / IM", notes: bw_note },
        { label: "腦膜炎（PNA 0–7/0–14天）", dose_per_kg: "100 mg/kg", total: `${(100*bw).toFixed(0)} mg`, freq: men_freq_early, route: "IV", notes: `GA ≤34wk 早期 Q8H；≥35wk 早期 Q8H` },
        { label: "腦膜炎（PNA >7/>14天）", dose_per_kg: "75 mg/kg", total: `${(75*bw).toFixed(0)} mg`, freq: men_freq_late, route: "IV", notes: "" },
        { label: "PNA 29–60天（腦膜炎）", dose_per_kg: "300–400 mg/kg/day", total: `${(300*bw/6).toFixed(0)}–${(400*bw/6).toFixed(0)} mg/dose（Q6H）`, freq: "÷ Q6H", route: "IV", notes: "" },
      ];
    }
  },
  gentamicin_neo: {
    name: "Gentamicin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 28;
      let dose, freq;
      if (ga < 30) { dose = 5; freq = pna <= 14 ? "Q48H" : "Q36H"; }
      else if (ga <= 34) { dose = 5; freq = pna <= 10 ? "Q36H" : "Q24H"; }
      else { dose = pna <= 7 ? 4 : 5; freq = "Q24H"; }
      const pca = ga + Math.floor(pna / 7);
      return [{ label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / IM", notes: `GA ${ga}wk, PCA ${pca}wk；Peak 6–12 mg/L；Trough <2 mg/L` }];
    }
  },
  // ── 新生兒抗生素（進階）──
  penicillin_g_neo: {
    name: "Penicillin G（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let gen_dose, gen_freq, men_dose, men_freq;
      if (ga <= 34) {
        gen_dose = "5萬 units/kg"; gen_freq = pna <= 7 ? "Q12H" : "Q8H";
        men_dose = "15萬 units/kg"; men_freq = pna <= 7 ? "Q8H" : "Q6H（12.5萬）";
      } else {
        gen_dose = "5萬 units/kg"; gen_freq = pna <= 7 ? "Q12H" : "Q8H";
        men_dose = "15萬 units/kg"; men_freq = pna <= 7 ? "Q8H" : "Q6H（12.5萬）";
      }
      return [
        { label: "一般感染", dose_per_kg: gen_dose, total: `${(50000*bw).toFixed(0)} units`, freq: gen_freq, route: "IV / IM", notes: `GA ${ga}wk, PNA ${pna}d` },
        { label: "腦膜炎", dose_per_kg: men_dose, total: `${(150000*bw).toFixed(0)} units`, freq: men_freq, route: "IV", notes: "腦膜炎用量顯著提高" },
        { label: "先天梅毒/神經梅毒", dose_per_kg: "5萬 units/kg", total: `${(50000*bw).toFixed(0)} units`, freq: "Q6H–Q4H", route: "IV", notes: "" },
      ];
    }
  },
  oxacillin_neo: {
    name: "Oxacillin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let dose, freq;
      if (ga <= 34) { dose = 25; freq = pna <= 14 ? "Q12H" : "Q8H"; }
      else { dose = 25; freq = pna <= 7 ? "Q8H" : "Q6H"; }
      return [
        { label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / IM", notes: `GA ${ga}wk` },
        { label: "腦膜炎", dose_per_kg: "50 mg/kg", total: `${(50*bw).toFixed(1)} mg`, freq: ga <= 34 ? (pna <= 14 ? "Q12H" : "Q8H") : (pna <= 7 ? "Q8H" : "Q6H"), route: "IV", notes: "腦膜炎劑量加倍" },
      ];
    }
  },
  pip_tazo_neo: {
    name: "Piperacillin-Tazobactam（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const pma = (gestAge || 35) + Math.floor(pna / 7);
      const dose_pipe = pma <= 30 ? "100 mg pip/kg" : "80 mg pip/kg";
      const freq = pma <= 30 ? "Q8H" : (pma <= 35 ? "Q6H（或考慮 Q4H 若 MIC↑）" : "Q6H");
      return [
        { label: "一般感染", dose_per_kg: dose_pipe, total: `${(100*bw).toFixed(0)}–${(80*bw).toFixed(0)} mg Pipe`, freq, route: "IV", notes: `PMA ${pma}wk；Pipe:Tazo = 8:1，112.5 mg/kg = 100 mg pip + 12.5 mg tazo` },
        { label: "PNA 29–60 天", dose_per_kg: "240–320 mg pip/kg/day", total: `${(240*bw).toFixed(0)}–${(320*bw).toFixed(0)} mg/day`, freq: "÷ Q8–6H", route: "IV", notes: "可延長輸注 3hr 以改善 PD 達標" },
      ];
    }
  },
  amoxicillin_neo: {
    name: "Amoxicillin（新生兒口服）", category: "抗生素（新生兒）",
    calc: ({ bw, pna }) => [
      { label: "一般感染 PO（PNA 0–28天）", dose_per_kg: "15 mg/kg", total: `${(15*bw).toFixed(1)} mg`, freq: "Q12H", route: "PO", notes: "新生兒口服首選；無靜脈劑型建議" },
      { label: "一般感染 PO（PNA 29–60天）", dose_per_kg: "40–45 mg/kg/day", total: `${(40*bw/3).toFixed(0)}–${(45*bw/3).toFixed(0)} mg/dose（Q8H）`, freq: "÷ Q8H（Standard）", route: "PO", notes: "高劑量: 80–90 mg/kg/day ÷ Q12H" },
    ]
  },
  azithromycin_neo: {
    name: "Azithromycin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw }) => [
      { label: "Chlamydia / Pertussis PO", dose_per_kg: "20 mg/kg/day", total: `${(20*bw).toFixed(1)} mg`, freq: "QD × 3 days（Chlamydia）", route: "PO", notes: "百日咳預防/治療: 10 mg/kg/day QD × 5 days" },
      { label: "PNA 29–60天：非典型肺炎", dose_per_kg: "10 mg/kg", total: `${(10*bw).toFixed(1)} mg`, freq: "QD × 3 days（非典型）", route: "PO", notes: "" },
    ]
  },
  rifampin_neo: {
    name: "Rifampin（新生兒接觸預防）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge }) => {

const CATS = [...new Set(Object.values(DRUGS).map(d=>d.category))];

// ── State (plain vars, no re-render on input) ──
let selDrug='', selCivd='', selConc=null, activeCat='全部', lastResult=null;

function neo() {
  const age = parseFloat(document.getElementById('i-age').value)||0;
  const pna = parseFloat(document.getElementById('i-pna').value)||0;
  return (age < 0.17) && (pna <= 60 || pna === 0);
}

function getPatient() {
  return {
    bw: parseFloat(document.getElementById('i-wt').value)||3,
    gestAge: parseFloat(document.getElementById('i-ga').value)||35,
    pna: parseFloat(document.getElementById('i-pna').value)||1,
    ageYears: parseFloat(document.getElementById('i-age').value)||0,
    isNeonatal: neo()
  };
}

function routeBadges(r) {
  if(!r) return '';
  return r.split(/[\/,]/).map(x=>x.trim()).filter(Boolean).map(x=>{
    const c = x==='IV'?'biv':x==='IM'?'bim':x==='PO'?'bpo':'bivd';
    return `<span class="badge ${c}">${x}</span>`;
  }).join('');
}

// ── Tab switching ──
function showTab(t) {
  document.getElementById('tab-drug').className='tab'+(t==='drug'?' on':'');
  document.getElementById('tab-civd').className='tab'+(t==='civd'?' on':'');
  document.getElementById('pane-drug').style.display=t==='drug'?'block':'none';
  document.getElementById('pane-civd').style.display=t==='civd'?'block':'none';
}

// ── Drug tab ──
function filterDrugs() {
  const q = document.getElementById('i-search').value.toLowerCase();
  document.querySelectorAll('.dbtn').forEach(btn=>{
    const name = btn.dataset.name.toLowerCase();
    const cat = btn.dataset.cat;
    const catOk = activeCat==='全部' || cat===activeCat;
    const qOk = !q || name.includes(q);
    btn.style.display = catOk&&qOk ? '' : 'none';
  });
}

function setCat(c) {
  activeCat = c;
  document.querySelectorAll('.tag').forEach(t=>{
    t.className = 'tag' + (t.dataset.cat===c?' on':'');
  });
  filterDrugs();
}

function pickDrug(k) {
  selDrug = k;
  document.querySelectorAll('.dbtn').forEach(b=>{
    b.className = 'dbtn' + (b.dataset.key===k?' on':'');
  });
  document.getElementById('r-area').innerHTML='';
}

function calculate() {
  if(!selDrug) return;
  const wt = document.getElementById('i-wt').value;
  if(!wt) return;
  const drug = DRUGS[selDrug];
  const rows = drug.calc(getPatient());
  lastResult = {name:drug.name, rows, weight:wt};
  showResult();
}

function showResult() {
  if(!lastResult) return;
  const {name,rows,weight} = lastResult;
  let html = `
  <div class="rcard">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      <div><div class="sec">▸ 計算結果</div><div style="font-size:16px;font-weight:700;color:#b8d8f4">${name}</div></div>
      <div style="text-align:right"><div style="font-size:12px;color:#406080">體重</div><div style="font-size:26px;font-weight:700;color:#32a0f0">${weight} <span style="font-size:13px;color:#506070">kg</span></div></div>
    </div>`;
  rows.forEach(row=>{
    const men = row.label&&(row.label.includes('腦膜炎')||row.label.includes('CNS')||row.label.includes('心內膜炎'));
    const ld = row.label&&(row.label.includes('Loading')||row.label.includes('loading'));
    html+=`
    <div class="rrow${men?' men':ld?' ld':''}">
      <div class="rh">
        ${men?'<span class="bmen">腦膜炎</span>':''}
        ${ld?'<span class="bld">LOADING</span>':''}
        <div class="rlbl${men?' men':ld?' ld':''}">${row.label}</div>
        <div>${routeBadges(row.route)}</div>
      </div>
      <div class="dgr">
        <div class="di"><label>每 kg 劑量</label><div class="v">${row.dose_per_kg}</div></div>
        <div class="di hl"><label>實際劑量</label><div class="v">${row.total}</div></div>
        <div class="di"><label>頻次</label><div class="v">${row.freq}</div></div>
      </div>
      ${row.notes?`<div class="warn">⚠ ${row.notes}</div>`:''}
    </div>`;
  });
  html+=`<div class="rf">⬡ 本結果僅供參考，請依藥物仿單及臨床狀況調整。來源：雙和醫院兒科藥劑部 2025版。</div></div>`;
  document.getElementById('r-area').innerHTML = html;
  document.getElementById('r-area').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── CIVD tab ──
function pickCivd(k) {
  selCivd=k; selConc=null;
  document.querySelectorAll('.pill').forEach(p=>p.className='pill'+(p.dataset.k===k?' on':''));
  const d = CIVD_DATA[k];
  const bw = parseFloat(document.getElementById('i-wt').value)||0;
  let ld = d.loading ? `<div class="cl">Loading：${d.loading}${bw?` → ${(parseFloat(d.loading)*bw).toFixed(1)} mg`:''}</div>` : '';
  let concs = d.concOptions.map(c=>`
    <button class="cc" data-c="${c}" onclick="pickConc(${c})">
      ${c} mcg/mL
      ${d.neoMaxConc&&c>d.neoMaxConc?`<span class="nw">⚠ 新生兒 Max ${d.neoMaxConc}</span>`:''}
    </button>`).join('');
  document.getElementById('civd-info').innerHTML=`
    <div class="ci">${d.name}</div>
    <div class="cs">${d.drug_info}</div>
    ${ld}
    <div class="sec">② 選擇濃度</div>
    <div class="cgrid">${concs}</div>`;
  document.getElementById('civd-vol-area').innerHTML='';
  document.getElementById('civd-result').innerHTML='';
}

function pickConc(c) {
  selConc=c;
  document.querySelectorAll('.cc').forEach(b=>b.className='cc'+(parseFloat(b.dataset.c)===c?' on':''));
  document.getElementById('civd-vol-area').innerHTML=`
    <div class="sec" style="margin-top:12px">③ 稀釋液總體積</div>
    <label style="display:block">
      <span style="font-size:13px;color:#406080;letter-spacing:1.5px">N/S（或 D5W）加至總體積（mL）</span>
      <input id="i-civdvol" type="number" placeholder="輸入 mL" style="margin-top:6px" oninput="calcCivd(this.value)"/>
    </label>
    <div class="pbtns">
      ${[10,25,50,100,250].map(v=>`<button class="pbtn" onclick="document.getElementById('i-civdvol').value=${v};calcCivd(${v})">${v} mL</button>`).join('')}
    </div>`;
  document.getElementById('civd-result').innerHTML='';
}

function calcCivd(vol) {
  const d = CIVD_DATA[selCivd];
  if(!d||selConc===null||!vol) return;
  const totalVol=parseFloat(vol);
  if(!totalVol) return;
  const conc=selConc;
  const drugMgNeeded = conc*totalVol/1000;
  const unitsNeeded = drugMgNeeded/d.drugMgPerUnit;
  const drugVolMl = unitsNeeded*d.drugMlPerUnit;
  const nsMl = totalVol-drugVolMl;
  const bw = parseFloat(document.getElementById('i-wt').value)||1;
  const flowLow = (d.dLow*bw*60/conc).toFixed(2);
  const flowHigh = (d.dHigh*bw*60/conc).toFixed(2);
  const steps=[
    `取 ${unitsNeeded.toFixed(2)} ${d.unitLabel}（= ${drugVolMl.toFixed(2)} mL）`,
    `加入 N/S${d.solvent==='D5W'?' 或 D5W':''} ${nsMl.toFixed(2)} mL`,
    `稀釋至總體積 ${totalVol} mL`,
    `最終濃度：${conc} mcg/mL`,
    `流速範圍：${flowLow}–${flowHigh} mL/hr（依體重 ${bw} kg）`
  ];
  document.getElementById('civd-result').innerHTML=`
    <div class="cr">
      <div class="crg">
        <div class="cri"><label>需要藥量</label><div class="v">${unitsNeeded.toFixed(2)} ${d.unitLabel}</div></div>
        <div class="cri"><label>藥物體積</label><div class="v">${drugVolMl.toFixed(2)} mL</div></div>
        <div class="cri"><label>N/S 加入</label><div class="v">${nsMl.toFixed(2)} mL</div></div>
        <div class="cri"><label>流速範圍</label><div class="v">${flowLow}–${flowHigh} mL/hr</div></div>
      </div>
      ${steps.map((s,i)=>`<div class="step"><b>${i+1}.</b>${s}</div>`).join('')}
    </div>`;
}

// ── Init ──
function init() {
  // Header
  document.getElementById('root').innerHTML = `
  <div class="header">
    <div class="hosp">雙和醫院 · 兒科藥劑部</div>
    <h1>兒科藥物劑量計算系統</h1>
    <div class="sub">參考雙和醫院 2025 版 · 僅供臨床參考</div>
    <div class="dev">開發者：羅家希</div>
    <div class="thanks">感謝曾如慧藥師提供資料</div>
  </div>

  <!-- Patient inputs - rendered once, never re-rendered -->
  <div class="card">
    <div class="sec">▸ 病人資料</div>
    <div class="grid4">
      <div class="ig"><label>體重（kg）</label><input id="i-wt" type="number" placeholder="kg"/></div>
      <div class="ig"><label>年齡（歲）</label><input id="i-age" type="number" placeholder="歲"/></div>
      <div class="ig"><label>GA（週）</label><input id="i-ga" type="number" placeholder="週"/></div>
      <div class="ig"><label>PNA（天）</label><input id="i-pna" type="number" placeholder="天"/></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button id="tab-drug" class="tab on" onclick="showTab('drug')">💊 一般藥物劑量</button>
    <button id="tab-civd" class="tab" onclick="showTab('civd')">🧪 急救 CIVD 泡法</button>
  </div>

  <!-- Drug pane -->
  <div id="pane-drug">
    <div class="card">
      <div class="sec">▸ 選擇藥物</div>
      <input id="i-search" type="text" placeholder="搜尋藥物..." style="margin-bottom:10px" oninput="filterDrugs()"/>
      <div class="tags">
        <button class="tag on" data-cat="全部" onclick="setCat('全部')">全部</button>
        ${CATS.map(c=>`<button class="tag" data-cat="${c.replace(/'/g,"\\'")}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('')}
      </div>
      <div class="dgrid">
        ${Object.entries(DRUGS).map(([k,d])=>`
          <button class="dbtn" data-key="${k}" data-name="${d.name}" data-cat="${d.category}" onclick="pickDrug('${k}')">
            <div class="dcat">${d.category}</div>${d.name}
          </button>`).join('')}
      </div>
    </div>
    <button class="cbtn" onclick="calculate()">⬡ 計算劑量</button>
    <div id="r-area"></div>
  </div>

  <!-- CIVD pane -->
  <div id="pane-civd" style="display:none">
    <div class="card">
      <div class="sec">① 選擇急救藥物</div>
      <div class="pills">
        ${Object.entries(CIVD_DATA).map(([k,d])=>`
          <button class="pill" data-k="${k}" onclick="pickCivd('${k}')">${d.name}</button>`).join('')}
      </div>
    </div>
    <div class="card" id="civd-info"></div>
    <div class="card" id="civd-vol-wrap" style="display:none"></div>
    <div id="civd-vol-area"></div>
    <div id="civd-result"></div>
  </div>`;
}

init();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
