<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>兒科藥物劑量計算器 2025</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1520;font-family:'Courier New',monospace;color:#8aa8bc;min-height:100vh;padding:12px}
h1{font-size:22px;font-weight:700;background:linear-gradient(90deg,#7ec8ff,#fff,#32a0f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header{text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(50,160,240,0.15)}
.header .sub{font-size:13px;color:#304050;margin-top:5px;letter-spacing:1px}
.header .dev{font-size:15px;color:#4a7a9a;margin-top:6px;letter-spacing:2px;font-weight:600}
.header .thanks{font-size:13px;color:#3a6a7a;margin-top:4px;letter-spacing:1px}
.header .hosp{font-size:13px;letter-spacing:6px;color:#32a0f0;margin-bottom:5px}
.card{background:rgba(15,30,50,0.8);border:1px solid rgba(50,100,150,0.3);border-radius:10px;padding:14px;margin-bottom:12px}
.section-title{font-size:13px;letter-spacing:3px;color:#406080;margin-bottom:10px;text-transform:uppercase}
input[type=number],input[type=text]{background:rgba(20,50,80,0.5);border:1px solid rgba(50,100,150,0.4);color:#8aa8bc;padding:8px 10px;border-radius:6px;font-family:inherit;font-size:14px;width:100%;outline:none}
input:focus{border-color:#32a0f0}
.input-group{margin-bottom:10px}
.input-group label{font-size:13px;color:#406080;letter-spacing:1.5px;display:block;margin-bottom:4px;text-transform:uppercase}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:10px;border:1px solid rgba(50,100,150,0.3);border-radius:8px;background:rgba(15,30,50,0.6);color:#406080;font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:1px}
.tab.active{background:rgba(50,160,240,0.12);border-color:rgba(50,160,240,0.5);color:#32a0f0}
.drug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:6px;margin-top:8px}
.drug-btn{background:rgba(20,40,60,0.5);border:1px solid rgba(50,100,150,0.25);color:#7a9ab0;padding:8px 10px;border-radius:7px;font-family:inherit;font-size:14px;cursor:pointer;text-align:left;line-height:1.35}
.drug-btn:hover{border-color:rgba(50,160,240,0.4);color:#32a0f0}
.drug-btn.selected{background:rgba(50,160,240,0.12);border-color:rgba(50,160,240,0.6);color:#7ec8ff}
.drug-btn .cat{font-size:12px;color:#304050;margin-bottom:2px}
.drug-btn.selected .cat{color:#32a0f0}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{padding:4px 10px;border-radius:10px;font-size:13px;border:1px solid rgba(50,100,150,0.3);color:#406080;background:rgba(15,30,50,0.5);cursor:pointer;font-family:inherit}
.tag.active{background:rgba(50,160,240,0.15);border-color:rgba(50,160,240,0.5);color:#32a0f0}
.calc-btn{width:100%;padding:12px;background:rgba(50,160,240,0.12);border:1px solid rgba(50,160,240,0.4);color:#32a0f0;font-family:inherit;font-size:16px;border-radius:8px;cursor:pointer;letter-spacing:2px;margin-top:4px}
.calc-btn:disabled{opacity:0.3;cursor:not-allowed}
.calc-btn:hover:not(:disabled){background:rgba(50,160,240,0.2)}
.result-card{background:rgba(15,30,50,0.8);border:1px solid rgba(50,160,240,0.4);border-radius:10px;padding:14px;margin-top:14px}
.result-name{font-size:16px;font-weight:700;color:#b8d8f4}
.result-weight{font-size:26px;font-weight:700;color:#32a0f0}
.result-row{border:1px solid rgba(50,100,150,0.3);border-radius:8px;padding:12px;margin-bottom:8px;background:rgba(20,40,60,0.4)}
.result-row.meningitis{border-color:rgba(255,100,100,0.35);background:rgba(255,60,60,0.04)}
.result-row.loading{border-color:rgba(255,180,0,0.35);background:rgba(255,160,0,0.04)}
.row-label{font-size:13px;letter-spacing:1.5px;color:#32a0f0;font-weight:600;text-transform:uppercase;flex:1}
.row-label.meningitis{color:#ff8080}
.row-label.loading{color:#ffcc60}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:12px;font-weight:700;margin-right:4px;letter-spacing:0.5px;color:#c8e8ff}
.badge-iv{background:#1a6ea8}
.badge-im{background:#4a7a28}
.badge-po{background:#7a4a98}
.badge-ivd{background:#0e5a8a}
.badge-men{font-size:11px;padding:1px 6px;background:rgba(255,80,80,0.2);color:#ff8080;border-radius:8px;font-weight:700;letter-spacing:1px}
.badge-load{font-size:11px;padding:1px 6px;background:rgba(255,160,0,0.2);color:#ffcc60;border-radius:8px;font-weight:700;letter-spacing:1px}
.row-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.dose-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.dose-item label{font-size:12px;color:#406080;letter-spacing:1px;display:block;margin-bottom:2px}
.dose-item .val{font-size:14px;color:#8aa8bc;line-height:1.35}
.dose-item.highlight .val{font-size:16px;color:#7ec8ff;font-weight:700}
.warn{font-size:13px;color:#6a8a60;background:rgba(50,100,40,0.1);border:1px solid rgba(80,140,60,0.2);border-radius:5px;padding:5px 8px;margin-top:8px}
.result-footer{font-size:12px;color:#203040;margin-top:8px}
.pill{padding:7px 14px;border-radius:20px;border:1px solid rgba(50,100,150,0.3);background:rgba(15,30,50,0.5);color:#406080;font-family:inherit;font-size:14px;cursor:pointer}
.pill.active{background:rgba(50,160,240,0.15);border-color:rgba(50,160,240,0.5);color:#32a0f0}
.pills{display:flex;flex-wrap:wrap;gap:7px}
.civd-info{font-size:14px;font-weight:700;color:#7ec8ff;margin-bottom:4px}
.civd-sub{font-size:13px;color:#506878;margin-bottom:12px}
.civd-loading{font-size:13px;color:#ffcc80;padding:6px 10px;background:rgba(255,168,0,0.05);border:1px solid rgba(255,168,0,0.2);border-radius:6px;margin-bottom:12px}
.conc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px}
.conc-btn{border:1px solid rgba(50,100,150,0.3);background:rgba(15,30,50,0.6);color:#406080;padding:8px 10px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;text-align:center}
.conc-btn.active{background:rgba(50,160,240,0.15);border-color:rgba(50,160,240,0.6);color:#7ec8ff}
.conc-btn .neo-warn{font-size:11px;color:#ffaa60;display:block;margin-top:2px}
.preset-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.preset-btn{padding:6px 14px;border-radius:14px;border:1px solid rgba(50,100,150,0.3);background:rgba(15,30,50,0.5);color:#406080;font-family:inherit;font-size:14px;cursor:pointer}
.preset-btn:hover{border-color:rgba(50,160,240,0.5);color:#32a0f0}
.civd-result{background:rgba(20,60,40,0.2);border:1px solid rgba(50,160,100,0.25);border-radius:8px;padding:12px;margin-top:12px}
.civd-result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:10px}
.civd-result-item label{font-size:12px;color:#406080;display:block;margin-bottom:2px}
.civd-result-item .val{font-size:15px;color:#7ec8ff;font-weight:700}
.steps{margin-top:8px}
.step{font-size:13px;color:#607080;padding:4px 0;border-bottom:1px solid rgba(50,80,100,0.15)}
.step:last-child{border-bottom:none}
.step span{color:#32a0f0;font-weight:700;margin-right:6px}
.neo-mode{font-size:12px;padding:3px 8px;background:rgba(255,140,0,0.1);border:1px solid rgba(255,140,0,0.3);border-radius:10px;color:#ffaa60;margin-left:8px}
.search{background:rgba(20,50,80,0.5);border:1px solid rgba(50,100,150,0.4);color:#8aa8bc;padding:8px 10px;border-radius:6px;font-family:inherit;font-size:14px;width:100%;outline:none;margin-bottom:10px}
.no-result{color:#304050;font-size:14px;text-align:center;padding:20px}
@media(max-width:480px){.drug-grid{grid-template-columns:1fr 1fr}.dose-grid{grid-template-columns:1fr 1fr}}
</style>

<body>
<div id="app"></div>
<script>

    drugMgPerUnit: 10, drugMlPerUnit: 10, unitLabel: "amp",

    loading: null,
    unit: "mcg/kg/hr", unitIsHr: true,
    drugMgPerUnit: 0.5, drugMlPerUnit: 10, unitLabel: "vial",  // 0.5 mg = 500 mcg per vial
    concOptions: [1, 2, 2.5, 5, 10],

  },
  midazolam_civd: {
    name: "Midazolam CIVD", drug_info: "5 mg/mL/amp（1 mL/amp = 5 mg/amp）",
    loading: "新生兒 LD: 0.1 mg/kg；PICU LD: 0.2 mg/kg",
    unit: "mcg/kg/min", unitIsHr: false,

  },

    name: "Alprostadil（PGE1）", drug_info: "Prostin VR 500 mcg/mL（0.5 mg/mL），1 mL/vial",

  },
  lidocaine: {

    unit: "mcg/kg/min", unitIsHr: false,
    drugMgPerUnit: 100, drugMlPerUnit: 5, unitLabel: "amp",

    neoMaxConc: null,
    note: null,
  },

// ─── 一般藥物資料庫 ──────────────────────────────────────────────────────────
const DRUGS = {
  ampicillin_neo: {
    name: "Ampicillin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let gen_dose, gen_freq, bw_note;
      // Nelson dosing by BW
      if (bw < 1) { gen_dose = 50; gen_freq = pna <= 14 ? "Q12H" : "Q8H"; bw_note = "BW < 1 kg"; }
      else if (bw <= 2) { gen_dose = 50; gen_freq = pna <= 7 ? "Q12H" : "Q8H"; bw_note = "BW 1–2 kg"; }
      else { gen_dose = 50; gen_freq = pna <= 7 ? "Q8H" : "Q6H"; bw_note = "BW > 2 kg"; }
      // Meningitis by GA
      const men_freq_early = ga <= 34 ? "Q8H" : "Q8H";
      const men_freq_late  = ga <= 34 ? "Q6H（75 mg/kg）" : "Q6H（75 mg/kg）";
      return [
        { label: "一般感染", dose_per_kg: `${gen_dose} mg/kg`, total: `${(gen_dose*bw).toFixed(1)} mg`, freq: gen_freq, route: "IV / IM", notes: bw_note },
        { label: "腦膜炎（PNA 0–7/0–14天）", dose_per_kg: "100 mg/kg", total: `${(100*bw).toFixed(0)} mg`, freq: men_freq_early, route: "IV", notes: `GA ≤34wk 早期 Q8H；≥35wk 早期 Q8H` },
        { label: "腦膜炎（PNA >7/>14天）", dose_per_kg: "75 mg/kg", total: `${(75*bw).toFixed(0)} mg`, freq: men_freq_late, route: "IV", notes: "" },
        { label: "PNA 29–60天（腦膜炎）", dose_per_kg: "300–400 mg/kg/day", total: `${(300*bw/6).toFixed(0)}–${(400*bw/6).toFixed(0)} mg/dose（Q6H）`, freq: "÷ Q6H", route: "IV", notes: "" },
      ];
    }
  },
  gentamicin_neo: {
    name: "Gentamicin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 28;
      let dose, freq;
      if (ga < 30) { dose = 5; freq = pna <= 14 ? "Q48H" : "Q36H"; }
      else if (ga <= 34) { dose = 5; freq = pna <= 10 ? "Q36H" : "Q24H"; }
      else { dose = pna <= 7 ? 4 : 5; freq = "Q24H"; }
      const pca = ga + Math.floor(pna / 7);
      return [{ label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / IM", notes: `GA ${ga}wk, PCA ${pca}wk；Peak 6–12 mg/L；Trough <2 mg/L` }];
    }
  },
  // ── 新生兒抗生素（進階）──
  penicillin_g_neo: {
    name: "Penicillin G（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let gen_dose, gen_freq, men_dose, men_freq;
      if (ga <= 34) {
        gen_dose = "5萬 units/kg"; gen_freq = pna <= 7 ? "Q12H" : "Q8H";
        men_dose = "15萬 units/kg"; men_freq = pna <= 7 ? "Q8H" : "Q6H（12.5萬）";
      } else {
        gen_dose = "5萬 units/kg"; gen_freq = pna <= 7 ? "Q12H" : "Q8H";
        men_dose = "15萬 units/kg"; men_freq = pna <= 7 ? "Q8H" : "Q6H（12.5萬）";
      }
      return [
        { label: "一般感染", dose_per_kg: gen_dose, total: `${(50000*bw).toFixed(0)} units`, freq: gen_freq, route: "IV / IM", notes: `GA ${ga}wk, PNA ${pna}d` },
        { label: "腦膜炎", dose_per_kg: men_dose, total: `${(150000*bw).toFixed(0)} units`, freq: men_freq, route: "IV", notes: "腦膜炎用量顯著提高" },
        { label: "先天梅毒/神經梅毒", dose_per_kg: "5萬 units/kg", total: `${(50000*bw).toFixed(0)} units`, freq: "Q6H–Q4H", route: "IV", notes: "" },
      ];
    }
  },
  oxacillin_neo: {
    name: "Oxacillin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let dose, freq;
      if (ga <= 34) { dose = 25; freq = pna <= 14 ? "Q12H" : "Q8H"; }
      else { dose = 25; freq = pna <= 7 ? "Q8H" : "Q6H"; }
      return [
        { label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / IM", notes: `GA ${ga}wk` },
        { label: "腦膜炎", dose_per_kg: "50 mg/kg", total: `${(50*bw).toFixed(1)} mg`, freq: ga <= 34 ? (pna <= 14 ? "Q12H" : "Q8H") : (pna <= 7 ? "Q8H" : "Q6H"), route: "IV", notes: "腦膜炎劑量加倍" },
      ];
    }
  },
  pip_tazo_neo: {
    name: "Piperacillin-Tazobactam（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const pma = (gestAge || 35) + Math.floor(pna / 7);
      const dose_pipe = pma <= 30 ? "100 mg pip/kg" : "80 mg pip/kg";
      const freq = pma <= 30 ? "Q8H" : (pma <= 35 ? "Q6H（或考慮 Q4H 若 MIC↑）" : "Q6H");
      return [
        { label: "一般感染", dose_per_kg: dose_pipe, total: `${(100*bw).toFixed(0)}–${(80*bw).toFixed(0)} mg Pipe`, freq, route: "IV", notes: `PMA ${pma}wk；Pipe:Tazo = 8:1，112.5 mg/kg = 100 mg pip + 12.5 mg tazo` },
        { label: "PNA 29–60 天", dose_per_kg: "240–320 mg pip/kg/day", total: `${(240*bw).toFixed(0)}–${(320*bw).toFixed(0)} mg/day`, freq: "÷ Q8–6H", route: "IV", notes: "可延長輸注 3hr 以改善 PD 達標" },
      ];
    }
  },
  amoxicillin_neo: {
    name: "Amoxicillin（新生兒口服）", category: "抗生素（新生兒）",
    calc: ({ bw, pna }) => [
      { label: "一般感染 PO（PNA 0–28天）", dose_per_kg: "15 mg/kg", total: `${(15*bw).toFixed(1)} mg`, freq: "Q12H", route: "PO", notes: "新生兒口服首選；無靜脈劑型建議" },
      { label: "一般感染 PO（PNA 29–60天）", dose_per_kg: "40–45 mg/kg/day", total: `${(40*bw/3).toFixed(0)}–${(45*bw/3).toFixed(0)} mg/dose（Q8H）`, freq: "÷ Q8H（Standard）", route: "PO", notes: "高劑量: 80–90 mg/kg/day ÷ Q12H" },

const CATEGORIES = [...new Set(Object.values(DRUGS).map(d => d.category))];

// ── State ──
let state = {
  weight: '', gestWeeks: '', pnaDays: '', ageYears: '',
  tab: 'drug',
  activeCat: '全部', search: '',
  selDrug: '', result: null,
  selCivd: '', civdInfo: null, selConc: null, civdVol: '', civdResult: null
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ── Helpers ──
function isNeonatal() {
  const ag = parseFloat(state.ageYears);
  const pna = parseFloat(state.pnaDays);
  return (!ag || ag < 0.17) && (!pna || pna <= 60);
}

function getPatient() {
  return {
    bw: parseFloat(state.weight) || 3,
    gestAge: parseFloat(state.gestWeeks) || 35,
    pna: parseFloat(state.pnaDays) || 1,
    ageYears: parseFloat(state.ageYears) || 0,
    isNeonatal: isNeonatal()
  };
}

function calculate() {
  const drug = DRUGS[state.selDrug];
  if (!drug || !state.weight) return;
  const rows = drug.calc(getPatient());
  setState({ result: { name: drug.name, rows } });
}

function onSelectCivd(key) {
  setState({ selCivd: key, civdInfo: CIVD_DATA[key], selConc: null, civdVol: '', civdResult: null });
}

function onSelectConc(conc) {
  setState({ selConc: conc, civdVol: '', civdResult: null });
}

function calcCivd(vol) {
  const d = state.civdInfo;
  if (!d || !state.selConc || !vol) return;
  const totalVol = parseFloat(vol);
  const conc = state.selConc; // mcg/mL
  let drugMgNeeded, unitsNeeded, drugVolMl, nsMl, flowLow, flowHigh, steps;

  if (d.unitIsHr) {
    // mcg/mL already, fentanyl/midazolam style
    drugMgNeeded = conc * totalVol / 1000;
  } else {
    drugMgNeeded = conc * totalVol / 1000;
  }
  unitsNeeded = drugMgNeeded / d.drugMgPerUnit;
  drugVolMl = unitsNeeded * d.drugMlPerUnit;
  nsMl = totalVol - drugVolMl;

  const bw = parseFloat(state.weight) || 1;
  const dLow = d.dLow, dHigh = d.dHigh;
  if (d.unitIsHr) {
    flowLow = (dLow * bw * 60 / conc).toFixed(2);
    flowHigh = (dHigh * bw * 60 / conc).toFixed(2);
  } else {
    flowLow = (dLow * bw * 60 / conc).toFixed(2);
    flowHigh = (dHigh * bw * 60 / conc).toFixed(2);
  }

  steps = [
    `取 ${unitsNeeded.toFixed(2)} ${d.unitLabel}（= ${drugVolMl.toFixed(2)} mL）`,
    `加入 N/S${d.solvent === 'D5W' ? ' 或 D5W' : ''} ${nsMl.toFixed(2)} mL`,
    `稀釋至總體積 ${totalVol} mL`,
    `最終濃度：${conc} mcg/mL`,
    `流速範圍：${flowLow}–${flowHigh} mL/hr（依體重 ${bw} kg）`
  ];

  setState({
    civdVol: vol,
    civdResult: { drugMgNeeded, unitsNeeded, drugVolMl, nsMl, flowLow, flowHigh, steps }
  });
}

// ── Route badge ──
function routeBadges(routeStr) {
  if (!routeStr) return '';
  return routeStr.split(/[/,]/).map(r => r.trim()).filter(Boolean).map(r => {
    const cls = r === 'IV' ? 'badge-iv' : r === 'IM' ? 'badge-im' : r === 'PO' ? 'badge-po' : 'badge-ivd';
    return `<span class="badge ${cls}">${r}</span>`;
  }).join('');
}

// ── Render ──
function updateInput(key, val, extraUpdates) {
  state[key] = val;
  if (extraUpdates) Object.assign(state, extraUpdates);
  // Only re-render non-input parts
  renderResults();
  renderNeoMode();
}

function renderResults() {

}

      <div class="input-group">
        <label>年齡（歲）</label>
        <input type="number" id="inp-age" placeholder="歲" oninput="updateInput('ageYears',this.value,{result:null})"/>
      </div>
      <div class="input-group">
        <label>GA（週）</label>
        <input type="number" id="inp-ga" placeholder="週" oninput="updateInput('gestWeeks',this.value,{result:null})"/>
      </div>
      <div class="input-group">
        <label>PNA（天）</label>
        <input type="number" id="inp-pna" placeholder="天" oninput="updateInput('pnaDays',this.value,{result:null})"/>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab ${state.tab === 'drug' ? 'active' : ''}" onclick="setState({tab:'drug'})">💊 一般藥物劑量</button>
    <button class="tab ${state.tab === 'civd' ? 'active' : ''}" onclick="setState({tab:'civd'})">🧪 急救 CIVD 泡法</button>
  </div>`;

  if (state.tab === 'drug') {
    html += `
    <div class="card">
      <div class="section-title">▸ 選擇藥物</div>
      <input class="search" type="text" placeholder="搜尋藥物..." oninput="updateInput('search',this.value)"/>
      <div class="tags">
        ${['全部', ...CATEGORIES].map(c => `<button class="tag ${state.activeCat === c ? 'active' : ''}" onclick="setState({activeCat:'${c.replace(/'/g,"\\'")}'})">${c}</button>`).join('')}
      </div>
      <div class="drug-grid">
        ${filtered.length ? filtered.map(([k, d]) => `
          <button class="drug-btn ${state.selDrug === k ? 'selected' : ''}" onclick="setState({selDrug:'${k}',result:null})">
            <div class="cat">${d.category}</div>${d.name}
          </button>`).join('') : '<div class="no-result">查無藥物</div>'}
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()" ${(!state.selDrug || !state.weight) ? 'disabled' : ''}>⬡ 計算劑量</button>
    <div id="results-area"></div>`;

  }
  // results rendered separately in results-area div
}

  if (state.tab === 'civd') {
    html += `
    <div class="card">
      <div class="section-title">① 選擇急救藥物</div>
      <div class="pills">
        ${Object.entries(CIVD_DATA).map(([k, d]) => `
          <button class="pill ${state.selCivd === k ? 'active' : ''}" onclick="onSelectCivd('${k}')">${d.name}</button>`).join('')}
      </div>
    </div>`;

    if (state.civdInfo) {
      const d = state.civdInfo;
      const bw = parseFloat(state.weight) || 0;
      html += `
      <div class="card">
        <div class="civd-info">${d.name}</div>
        <div class="civd-sub">${d.drug_info}</div>
        ${d.loading ? `<div class="civd-loading">Loading：${d.loading}${bw ? ` → ${(parseFloat(d.loading)*bw).toFixed(1)} mg` : ''}</div>` : ''}
        <div class="section-title">② 選擇濃度</div>
        <div class="conc-grid">
          ${d.concOptions.map(c => `
            <button class="conc-btn ${state.selConc === c ? 'active' : ''}" onclick="onSelectConc(${c})">
              ${c} mcg/mL
              ${d.neoMaxConc && c > d.neoMaxConc ? `<span class="neo-warn">⚠ 新生兒 Max ${d.neoMaxConc}</span>` : ''}
            </button>`).join('')}
        </div>
      </div>`;
    }

    if (state.selConc !== null) {
      html += `
      <div class="card">
        <div class="section-title">③ 稀釋液總體積</div>
        <label class="input-group" style="display:block">
          <span style="font-size:13px;color:#406080;letter-spacing:1.5px">N/S（或 D5W）加至總體積（mL）</span>
          <input type="number" placeholder="輸入 mL" oninput="calcCivd(this.value)" style="margin-top:6px"/>
        </label>
        <div class="preset-btns">
          ${[10,25,50,100,250].map(v => `<button class="preset-btn" onclick="document.querySelector('#app input[type=number]:last-of-type').value=${v};calcCivd(${v})">${v} mL</button>`).join('')}
        </div>
        ${state.civdResult ? (() => {
          const r = state.civdResult;
          const d = state.civdInfo;
          return `
        <div class="civd-result">
          <div class="civd-result-grid">
            <div class="civd-result-item"><label>需要藥量</label><div class="val">${r.unitsNeeded.toFixed(2)} ${d.unitLabel}</div></div>
            <div class="civd-result-item"><label>藥物體積</label><div class="val">${r.drugVolMl.toFixed(2)} mL</div></div>
            <div class="civd-result-item"><label>N/S 加入</label><div class="val">${r.nsMl.toFixed(2)} mL</div></div>
            <div class="civd-result-item"><label>流速範圍</label><div class="val">${r.flowLow}–${r.flowHigh} mL/hr</div></div>
          </div>
          <div class="steps">
            ${r.steps.map((s, i) => `<div class="step"><span>${i+1}.</span>${s}</div>`).join('')}
          </div>
        </div>`;
        })() : ''}
      </div>`;
    }
  }

  document.getElementById('app').innerHTML = html;
}

render();

// After initial render, restore input values
setTimeout(() => {
  const ids = ['inp-weight','inp-age','inp-ga','inp-pna'];
  const keys = ['weight','ageYears','gestWeeks','pnaDays'];
  ids.forEach((id,i) => {
    const el = document.getElementById(id);
    if (el && state[keys[i]]) el.value = state[keys[i]];
  });
}, 0);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(r => {
      console.log('SW registered');
    }).catch(e => console.log('SW failed:', e));
  });
}
</script>
</body>
</html>
