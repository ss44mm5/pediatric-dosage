// ─── 一般藥物資料庫 ──────────────────────────────────────────────────────────
const DRUGS = {
  ampicillin_neo: {
    name: "Ampicillin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let gen_dose, gen_freq, bw_note;
      // Nelson dosing by BW
      if (bw < 1) { gen_dose = 50; gen_freq = pna <= 14 ? "Q12H" : "Q8H"; bw_note = "BW < 1 kg"; }
      else if (bw <= 2) { gen_dose = 50; gen_freq = pna <= 7 ? "Q12H" : "Q8H"; bw_note = "BW 1–2 kg"; }
      else { gen_dose = 50; gen_freq = pna <= 7 ? "Q8H" : "Q6H"; bw_note = "BW > 2 kg"; }
      // Meningitis by GA
      const men_freq_early = ga <= 34 ? "Q8H" : "Q8H";
      const men_freq_late  = ga <= 34 ? "Q6H（75 mg/kg）" : "Q6H（75 mg/kg）";
      return [
        { label: "一般感染", dose_per_kg: `${gen_dose} mg/kg`, total: `${(gen_dose*bw).toFixed(1)} mg`, freq: gen_freq, route: "IV / IM", notes: bw_note },
        { label: "腦膜炎（PNA 0–7/0–14天）", dose_per_kg: "100 mg/kg", total: `${(100*bw).toFixed(0)} mg`, freq: men_freq_early, route: "IV", notes: `GA ≤34wk 早期 Q8H；≥35wk 早期 Q8H` },
        { label: "腦膜炎（PNA >7/>14天）", dose_per_kg: "75 mg/kg", total: `${(75*bw).toFixed(0)} mg`, freq: men_freq_late, route: "IV", notes: "" },
        { label: "PNA 29–60天（腦膜炎）", dose_per_kg: "300–400 mg/kg/day", total: `${(300*bw/6).toFixed(0)}–${(400*bw/6).toFixed(0)} mg/dose（Q6H）`, freq: "÷ Q6H", route: "IV", notes: "" },
      ];
    }
  },
  gentamicin_neo: {
    name: "Gentamicin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 28;
      let dose, freq;
      if (ga < 30) { dose = 5; freq = pna <= 14 ? "Q48H" : "Q36H"; }
      else if (ga <= 34) { dose = 5; freq = pna <= 10 ? "Q36H" : "Q24H"; }
      else { dose = pna <= 7 ? 4 : 5; freq = "Q24H"; }
      const pca = ga + Math.floor(pna / 7);
      return [{ label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / IM", notes: `GA ${ga}wk, PCA ${pca}wk；Peak 6–12 mg/L；Trough <2 mg/L` }];
    }
  },
  // ── 新生兒抗生素（進階）──
  penicillin_g_neo: {
    name: "Penicillin G（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      let gen_dose, gen_freq, men_dose, men_freq;
      if (ga <= 34) {
        gen_dose = "5萬 units/kg"; gen_freq = pna <= 7 ? "Q12H" : "Q8H";
        men_dose = "15萬 units/kg"; men_freq = pna <= 7 ? "Q8H" : "Q6H（12.5萬）";
      } else {
        gen_dose = "5萬 units/kg"; gen_freq = pna <= 7 ? "Q12H" : "Q8H";
        men_dose = "15萬 units/kg"; men_freq = pna <= 7 ? "Q8H" : "Q6H（12.5萬）";
      }
      return [
        { label: "一般感染", dose_per_kg: gen_dose, total: `${(50000*bw).toFixed(0)} units`, freq: gen_freq, route: "IV / IM", notes: `GA ${ga}wk, PNA ${pna}d` },
        { label: "腦膜炎", dose_per_kg: men_dose, total: `${(150000*bw).toFixed(0)} units`, freq: men_freq, route: "IV", notes: "腦膜炎用量顯著提高" },
        { label: "先天梅毒/神經梅毒", dose_per_kg: "5萬 units/kg", total: `${(50000*bw).toFixed(0)} units`, freq: "Q6H–Q4H", route: "IV", notes: "" },
      ];
    }
  },
  oxacillin_neo: {
    name: "Oxacillin（新生兒）", category: "抗生素（新生兒）",

    name: "Piperacillin-Tazobactam（新生兒）", category: "抗生素（新生兒）",

      const pma = (gestAge || 35) + Math.floor(pna / 7);

      ];

  },
  amoxicillin_neo: {
    name: "Amoxicillin（新生兒口服）", category: "抗生素（新生兒）",
    calc: ({ bw, pna }) => [

  azithromycin_neo: {
    name: "Azithromycin（新生兒）", category: "抗生素（新生兒）",

      { label: "PNA 29–60天：非典型肺炎", dose_per_kg: "10 mg/kg", total: `${(10*bw).toFixed(1)} mg`, freq: "QD × 3 days（非典型）", route: "PO", notes: "" },

  rifampin_neo: {
    name: "Rifampin（新生兒接觸預防）", category: "抗生素（新生兒）",

      const ga = gestAge || 35;
      return [
        { label: "Hi 流感菌預防 PO", dose_per_kg: "10 mg/kg/day", total: `${(10*bw).toFixed(1)} mg（Max 600 mg）`, freq: "QD × 4 days", route: "PO", notes: `GA ${ga}wk；腦膜炎雙球菌: 5 mg/kg Q12H × 2 days` },
      ];
    }
  },
  amikacin_neo: {
    name: "Amikacin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 28;
      let dose, freq;
      if (ga < 30) { dose = 15; freq = pna <= 14 ? "Q48H" : "Q36H"; }
      else if (ga <= 34) { dose = 15; freq = pna <= 10 ? "Q36H" : "Q24H"; }
      else { dose = pna <= 7 ? 15 : 18; freq = "Q24H"; }
      return [{ label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / IM", notes: `GA ${ga}wk；Peak 20–40 mg/L；Trough <7 mg/L` }];
    }
  },
  cefotaxime_neo: {
    name: "Cefotaxime 三代（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 35;
      const gen_freq = ga <= 31 ? (pna <= 7 ? "Q12H" : "Q8H") : (pna <= 7 ? "Q12H" : "Q8H");
      const pna2960 = pna > 28;
      return [
        { label: "一般感染（IV/IM）", dose_per_kg: "50 mg/kg", total: `${(50*bw).toFixed(1)} mg`, freq: pna2960 ? "Q6H" : gen_freq, route: "IV / IM", notes: `GA ${ga}wk, PNA ${pna}d；CNS 穿透佳` },
        { label: "腦膜炎（PNA 0–7天）IV", dose_per_kg: "50 mg/kg Q8H（150 mg/kg/day）", total: `${(50*bw).toFixed(0)} mg/dose`, freq: "Q8H（或主治同意 100 mg/kg/day ÷ Q12H）", route: "IV", notes: "" },
        { label: "腦膜炎（PNA >7天）IV", dose_per_kg: "50 mg/kg Q6H（200 mg/kg/day）", total: `${(50*bw).toFixed(0)} mg/dose`, freq: "Q6H（或主治同意 150 mg/kg/day ÷ Q8H）", route: "IV", notes: "G(-) meningitis：療程 ≥21 天，首次 negative CSF culture 後 ≥14 天" },
        ...(pna2960 ? [{ label: "腦膜炎（PNA 29–60天）IV", dose_per_kg: "225–300 mg/kg/day", total: `${(225*bw/4).toFixed(0)}–${(75*bw).toFixed(0)} mg/dose（Q6H）`, freq: "÷ Q6H", route: "IV", notes: "" }] : []),
      ];
    }
  },
  cefazolin_neo: {
    name: "Cefazolin 一代（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, pna }) => {
      const dose = pna <= 14 ? 25 : 50;
      const freq = pna <= 14 ? "Q12H" : "Q8H";
      return [{ label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / IM", notes: `PNA ${pna}d；PNA 29–60d: 100–150 mg/kg/day ÷ Q8–6H` }];
    }
  },
  ceftriaxone_neo: {
    name: "Ceftriaxone 三代（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw }) => [
      { label: "一般感染", dose_per_kg: "50 mg/kg", total: `${(50*bw).toFixed(1)} mg`, freq: "Q24H", route: "IV / IM", notes: "新生兒≤28天須謹慎，有膽紅素置換風險" },
      { label: "PNA 29–60天", dose_per_kg: "50–100 mg/kg/day", total: `${(50*bw).toFixed(1)}–${(100*bw).toFixed(1)} mg/day`, freq: "QD 或 ÷ Q12H（CNS）", route: "IV", notes: "" },
    ]
  },

  meropenem_neo: {
    name: "Meropenem（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const ga = gestAge || 28;
      let gen_dose, men_dose, freq_suffix;
      if (pna <= 14) { gen_dose = 20; freq_suffix = ga <= 34 ? "Q12H" : "Q12H"; }
      else { gen_dose = 20; freq_suffix = ga <= 34 ? "Q8H" : "Q8H"; }
      men_dose = 40;
      return [
        { label: "一般感染（MIC <4）", dose_per_kg: `${gen_dose} mg/kg`, total: `${(gen_dose*bw).toFixed(1)} mg`, freq: freq_suffix, route: "IV", notes: `GA ${ga}wk, PNA ${pna}d` },
        { label: "一般感染（MIC 4–8）", dose_per_kg: "40 mg/kg", total: `${(40*bw).toFixed(1)} mg`, freq: freq_suffix, route: "IV", notes: "可考慮 4hr 延長輸注" },
        { label: "腦膜炎", dose_per_kg: `${men_dose} mg/kg`, total: `${(men_dose*bw).toFixed(1)} mg`, freq: freq_suffix, route: "IV", notes: "" },
        { label: "PNA 29–60天", dose_per_kg: "30 mg/kg", total: `${(30*bw).toFixed(1)} mg`, freq: "Q8H", route: "IV", notes: "" },
      ];
    }
  },
  clindamycin_neo: {
    name: "Clindamycin（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, gestAge, pna }) => {
      const pma = (gestAge || 35) + Math.floor(pna / 7);
      const dose = pma <= 32 ? 5 : pma <= 40 ? 7 : 9;
      return [{ label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq: "Q8H", route: "IV / PO", notes: `PMA ${pma}wk；PNA 29–60d: 10 mg/kg Q8H` }];

  },

    calc: ({ bw, gestAge, pna }) => {
      const pma = (gestAge || 35) + Math.floor(pna / 7);
      const dose = pma <= 33 ? 7.5 : pma <= 40 ? 7.5 : 7.5;
      const freq = pma <= 33 ? "Q12H" : (pma <= 40 ? "Q8H" : "Q6H or 10 mg/kg Q8H");
      return [
        { label: "一般感染", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / PO", notes: `PMA ${pma}wk；PNA ≤28d 先給 LD 15 mg/kg；可用於 CNS 感染` },

      ];
    }
  },
  linezolid_neo: {
    name: "Linezolid（新生兒）", category: "抗生素（新生兒）",
    calc: ({ bw, pna }) => {
      const dose = pna <= 14 ? 10 : 10;
      const freq = pna <= 14 ? "Q12H" : "Q8H";
      return [{ label: "MRSA / VRE", dose_per_kg: `${dose} mg/kg`, total: `${(dose*bw).toFixed(1)} mg`, freq, route: "IV / PO", notes: `PNA 29–60d: 10 mg/kg Q8H` }];
    }
  },

      { label: "癲癇持續（>30天）", dose_per_kg: "0.15–0.2 mg/kg", total: `${(0.15*bw).toFixed(2)}–${(0.2*bw).toFixed(2)} mg（Max 10 mg）`, freq: "5 min 後可再給 1 次", route: "IV", notes: "新生兒禁用" },
    ]
  },
  levetiracetam: {
    name: "Levetiracetam（Keppra）", category: "急救藥物",
    calc: ({ bw, isNeonatal }) => isNeonatal ? [
      { label: "Loading（新生兒）", dose_per_kg: "20–30 mg/kg", total: `${(20*bw).toFixed(0)}–${(30*bw).toFixed(0)} mg`, freq: "單次", route: "IV", notes: "" },
      { label: "維持（新生兒）", dose_per_kg: "30–60 mg/kg/day", total: `${(30*bw).toFixed(0)}–${(60*bw).toFixed(0)} mg/day`, freq: "÷ Q12H", route: "IV / PO", notes: "" },
    ] : [
      { label: "Loading", dose_per_kg: "20–60 mg/kg", total: `${(20*bw).toFixed(0)}–${(60*bw).toFixed(0)} mg（Max 4500 mg）`, freq: "單次", route: "IV", notes: "" },
      { label: "維持", dose_per_kg: "20–60 mg/kg/day", total: `${(20*bw).toFixed(0)}–${(60*bw).toFixed(0)} mg/day（Max 3000/dose）`, freq: "÷ Q12H", route: "IV / PO", notes: "" },
    ]
  },
  morphine: {
    name: "Morphine", category: "止痛/鎮靜",
    calc: ({ bw, isNeonatal }) => isNeonatal ? [
      { label: "止痛/插管（新生兒）", dose_per_kg: "0.05–0.1 mg/kg", total: `${(0.05*bw).toFixed(3)}–${(0.1*bw).toFixed(3)} mg`, freq: "Q4–6H PRN", route: "IV slow 3–5 min", notes: "" },
    ] : [
      { label: "程序止痛", dose_per_kg: "0.05–0.1 mg/kg", total: `${(0.05*bw).toFixed(2)}–${(0.1*bw).toFixed(2)} mg`, freq: "PRN", route: "IV slow", notes: "5 min 後可追加" },
      { label: "止痛（>6月）", dose_per_kg: "0.05–0.2 mg/kg", total: `${(0.05*bw).toFixed(2)}–${(0.2*bw).toFixed(2)} mg`, freq: "Q2–4H PRN", route: "IV/IM/SC", notes: "Max: <6yr 4mg，7–12yr 8mg" },
    ]
  },
  fentanyl: {
    name: "Fentanyl 推注", category: "止痛/鎮靜",
    calc: ({ bw, isNeonatal }) => isNeonatal ? [
      { label: "間歇止痛（新生兒）", dose_per_kg: "0.5–4 mcg/kg", total: `${(0.5*bw).toFixed(1)}–${(4*bw).toFixed(1)} mcg`, freq: "Q2–4H PRN", route: "IV slow 3–5 min", notes: "" },
    ] : [
      { label: "程序止痛", dose_per_kg: "1–2 mcg/kg", total: `${(1*bw).toFixed(1)}–${(2*bw).toFixed(1)} mcg`, freq: "Q30–60 min PRN", route: "IV slow", notes: "Max 100 mcg（ICU）" },
    ]
  },
  ketamine: {
    name: "Ketamine", category: "止痛/鎮靜",
    calc: ({ bw }) => [
      { label: "程序鎮靜 IV", dose_per_kg: "1–2 mg/kg", total: `${(1*bw).toFixed(2)}–${(2*bw).toFixed(2)} mg`, freq: "必要時", route: "IV over 30–60 sec", notes: "≥3 個月使用" },
      { label: "程序鎮靜 IM", dose_per_kg: "1–5 mg/kg", total: `${(1*bw).toFixed(2)}–${(5*bw).toFixed(2)} mg`, freq: "必要時", route: "IM", notes: "5–10 min 後可追加" },
    ]
  },
  caffeine: {
    name: "Caffeine Citrate（Peyona）", category: "新生兒呼吸",
    calc: ({ bw }) => [
      { label: "Loading", dose_per_kg: "20 mg/kg（1 mL/kg）", total: `${(20*bw).toFixed(1)} mg = ${(1*bw).toFixed(2)} mL`, freq: "單次 IVD 30 min", route: "IV / PO", notes: "" },
      { label: "維持", dose_per_kg: "5 mg/kg（0.25 mL/kg）", total: `${(5*bw).toFixed(1)} mg = ${(0.25*bw).toFixed(2)} mL`, freq: "QD（LD 後 24h 始）", route: "IV / PO", notes: "" },
    ]
  },
  dexamethasone: {
    name: "Dexamethasone（哮吼）", category: "類固醇",
    calc: ({ bw }) => [{ label: "哮吼", dose_per_kg: "0.6 mg/kg × 1 dose", total: `${Math.min(0.6*bw,10).toFixed(2)} mg（Max 10 mg）`, freq: "單次", route: "PO / IV / IM", notes: "" }]
  },
  prednisolone: {
    name: "Prednisolone（氣喘）", category: "類固醇",
    calc: ({ bw }) => [{ label: "急性發作", dose_per_kg: "1–2 mg/kg/day", total: `${(1*bw).toFixed(1)}–${(2*bw).toFixed(1)} mg/day（Max 60 mg）`, freq: "÷ Q12H", route: "PO", notes: "" }]
  },
  oseltamivir: {
    name: "Oseltamivir（Tamiflu）", category: "抗病毒藥",
    calc: ({ bw, gestAge, pna }) => {
      const pma = gestAge ? gestAge + Math.floor(pna / 7) : 99;
      if (pma < 38) return [{ label: "PMA <38週", dose_per_kg: "1 mg/kg", total: `${(1*bw).toFixed(2)} mg`, freq: "BID × 5 days", route: "PO", notes: "" }];
      if (pma < 41) return [{ label: "PMA 38–40週", dose_per_kg: "1.5 mg/kg", total: `${(1.5*bw).toFixed(2)} mg`, freq: "BID × 5 days", route: "PO", notes: "" }];
      const dose = bw <= 15 ? 30 : bw <= 23 ? 45 : bw <= 40 ? 60 : 75;
      return [
        { label: "流感治療", dose_per_kg: `${dose} mg/dose`, total: `${dose} mg`, freq: "BID × 5 days", route: "PO", notes: `BW ${bw} kg → ${dose} mg/dose` },
        { label: "流感預防", dose_per_kg: `${dose/2} mg QD`, total: `${dose/2} mg`, freq: "QD × 10 days", route: "PO", notes: "" },
      ];
    }
  },
  acyclovir: {
    name: "Acyclovir（抗疱疹）", category: "抗病毒藥",
    calc: ({ bw, isNeonatal }) => isNeonatal ? [
      { label: "新生兒 HSV", dose_per_kg: "20 mg/kg/dose", total: `${(20*bw).toFixed(1)} mg/dose`, freq: "Q8H × 14–21 天", route: "IV", notes: "PMA <30wk 可 40 mg/kg/day ÷ Q12H" },
    ] : [
      { label: "HSV 腦炎（4mo–12yr）", dose_per_kg: "10–15 mg/kg/dose", total: `${(10*bw).toFixed(1)}–${(15*bw).toFixed(1)} mg/dose`, freq: "Q8H × 14–21 天", route: "IV", notes: "" },
    ]
  },
};

const CATEGORIES = [...new Set(Object.values(DRUGS).map(d => d.category))];

// ─── Styles ──────────────────────────────────────────────────────────────────
const S = {
  page: { minHeight:"100vh", background:"linear-gradient(135deg,#06101f 0%,#0a1830 60%,#060d18 100%)", fontFamily:"'IBM Plex Mono','Courier New',monospace", color:"#d8e8f4", padding:"14px" },
  card: { background:"rgba(8,20,46,0.9)", border:"1px solid rgba(50,160,240,0.22)", borderRadius:10, padding:"16px 18px", marginBottom:14 },
  label: { fontSize:13, color:"#4a6a88", letterSpacing:1.8, display:"block", marginBottom:4, textTransform:"uppercase" },
  input: { width:"100%", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(50,160,240,0.22)", borderRadius:6, color:"#d8e8f4", padding:"8px 10px", fontSize:17, outline:"none", boxSizing:"border-box", fontFamily:"inherit" },
  sectionTitle: { fontSize:13, color:"#32a0f0", letterSpacing:4, marginBottom:12, textTransform:"uppercase" },
  tag: a => ({ padding:"4px 9px", borderRadius:4, border:a?"1px solid #32a0f0":"1px solid rgba(255,255,255,0.08)", background:a?"rgba(50,160,240,0.12)":"transparent", color:a?"#32a0f0":"#506070", fontSize:14, cursor:"pointer", fontFamily:"inherit", letterSpacing:0.5 }),
  drugBtn: s => ({ padding:"9px 10px", borderRadius:6, border:s?"1px solid #32a0f0":"1px solid rgba(255,255,255,0.07)", background:s?"rgba(50,160,240,0.09)":"rgba(255,255,255,0.01)", color:s?"#b8d8f4":"#607888", fontSize:15, cursor:"pointer", textAlign:"left", fontFamily:"inherit", lineHeight:1.4 }),
  calcBtn: d => ({ width:"100%", padding:"13px", borderRadius:8, border:"none", background:d?"rgba(50,160,240,0.07)":"linear-gradient(90deg,#015fa0,#32a0f0)", color:d?"#304050":"#fff", fontSize:16, fontWeight:700, cursor:d?"not-allowed":"pointer", letterSpacing:3, fontFamily:"inherit" }),
  resultRow: { padding:"11px 12px", borderRadius:7, marginBottom:8, background:"rgba(50,160,240,0.04)", border:"1px solid rgba(50,160,240,0.14)" },
  hl: { background:"rgba(50,160,240,0.1)", border:"1px solid rgba(50,160,240,0.22)", borderRadius:6, padding:"8px 11px" },
  warn: { marginTop:7, padding:"6px 10px", background:"rgba(255,168,0,0.05)", border:"1px solid rgba(255,168,0,0.2)", borderRadius:6, fontSize:15, color:"#ffcc80", lineHeight:1.6 },
  pill: s => ({ padding:"5px 11px", borderRadius:20, border:s?"1px solid #32a0f0":"1px solid rgba(255,255,255,0.1)", background:s?"rgba(50,160,240,0.11)":"transparent", color:s?"#7ec8ff":"#506070", fontSize:14, cursor:"pointer", fontFamily:"inherit", letterSpacing:0.5, whiteSpace:"nowrap" }),
  concBtn: s => ({ padding:"7px 13px", borderRadius:6, border:s?"1px solid #32a0f0":"1px solid rgba(50,160,240,0.2)", background:s?"rgba(50,160,240,0.15)":"rgba(50,160,240,0.04)", color:s?"#7ec8ff":"#506878", fontSize:16, fontWeight:s?700:400, cursor:"pointer", fontFamily:"inherit", letterSpacing:0.5 }),
};

function App() {
  const [weight, setWeight] = useState("");
  const [gestWeeks, setGestWeeks] = useState("");
  const [pnaDays, setPnaDays] = useState("");
  const [ageYears, setAgeYears] = useState("");
  const [tab, setTab] = useState("drug");
  const [activeCat, setActiveCat] = useState("全部");
  const [search, setSearch] = useState("");
  const [selDrug, setSelDrug] = useState("");
  const [selCivd, setSelCivd] = useState("");
  const [selConc, setSelConc] = useState(null);
  const [nsVolume, setNsVolume] = useState("");   // ← 使用者自行輸入 N/S mL
  const [result, setResult] = useState(null);
  const [civdResult, setCivdResult] = useState(null);

  const bw = parseFloat(weight) || 0;
  const isNeo = !!(gestWeeks || pnaDays || (ageYears !== "" && parseFloat(ageYears) < 0.083));
  const pna = pnaDays ? parseFloat(pnaDays) : ageYears ? parseFloat(ageYears) * 365 : 0;
  const gestAge = gestWeeks ? parseFloat(gestWeeks) : null;

  const filteredDrugs = useMemo(() =>
    Object.entries(DRUGS).filter(([,d]) => {
      const catOk = activeCat === "全部" || d.category === activeCat;
      const srchOk = !search || d.name.toLowerCase().includes(search.toLowerCase());
      return catOk && srchOk;
    }), [activeCat, search]);

  const calculate = () => {
    if (!selDrug || !bw) return;
    const rows = DRUGS[selDrug].calc({ bw, gestAge, pna, isNeonatal: isNeo });
    setResult({ name: DRUGS[selDrug].name, rows });
  };

  // ─ CIVD 計算核心 ─
  const civdInfo = selCivd ? CIVD_DATA[selCivd] : null;

  const calcCivd = () => {
    if (!civdInfo || !bw || !selConc || !nsVolume) return;
    const totalVol = parseFloat(nsVolume);  // 使用者輸入的總 volume
    const concMcgMl = selConc;             // 目標濃度 mcg/mL
    // 需要藥物總量 (mg) = conc(mcg/mL) × totalVol(mL) / 1000
    const drugMgNeeded = concMcgMl * totalVol / 1000;
    const unitsNeeded = drugMgNeeded / civdInfo.drugMgPerUnit;
    const drugVolMl = unitsNeeded * civdInfo.drugMlPerUnit;
    const nsMl = Math.max(0, totalVol - drugVolMl);

    // 流速
    const isHr = civdInfo.unitIsHr;
    const fLow  = isHr ? (civdInfo.dLow  * bw / concMcgMl).toFixed(2) : (civdInfo.dLow  * bw * 60 / concMcgMl).toFixed(2);
    const fHigh = isHr ? (civdInfo.dHigh * bw / concMcgMl).toFixed(2) : (civdInfo.dHigh * bw * 60 / concMcgMl).toFixed(2);

    setCivdResult({ totalVol, concMcgMl, drugMgNeeded, unitsNeeded, drugVolMl, nsMl, fLow, fHigh });
  };

  // 當選藥物改變，清 conc 和 result
  const onSelectCivd = (k) => { setSelCivd(k); setSelConc(null); setNsVolume(""); setCivdResult(null); };
  const onSelectConc = (c) => { setSelConc(c); setCivdResult(null); };

  const neoWarn = civdInfo && civdInfo.neoMaxConc && selConc && selConc > civdInfo.neoMaxConc && isNeo;

  return (
    <div style={S.page}>
      <div style={{ maxWidth: 900, margin: "0 auto" }}>

        {/* Header */}
        <div style={{ textAlign:"center", marginBottom:22, paddingBottom:14, borderBottom:"1px solid rgba(50,160,240,0.15)" }}>
          <div style={{ fontSize:13, letterSpacing:6, color:"#32a0f0", marginBottom:5 }}>雙和醫院 · 兒科藥劑部</div>
          <h1 style={{ fontSize:24, fontWeight:700, background:"linear-gradient(90deg,#7ec8ff,#fff,#32a0f0)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", margin:0, letterSpacing:2 }}>
            兒科藥物劑量計算系統
          </h1>
          <div style={{ fontSize:13, color:"#304050", marginTop:5, letterSpacing:1 }}>參考雙和醫院 2025 版 · 僅供臨床參考</div>
          <div style={{ fontSize:17, color:"#4a7a9a", marginTop:6, letterSpacing:2, fontWeight:600 }}>開發者：羅家希</div>
          <div style={{ fontSize:13, color:"#3a6a7a", marginTop:4, letterSpacing:1 }}>感謝曾如慧藥師提供資料</div>
        </div>

        {/* Patient Info */}
        <div style={S.card}>
          <div style={S.sectionTitle}>▸ 病人資料</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10 }}>
            {[["體重（kg）*",weight,setWeight,"例：3.2"],["年齡（歲，選填）",ageYears,setAgeYears,"例：0.5"],["妊娠週數 GA（新生兒）",gestWeeks,setGestWeeks,"例：32"],["出生後天數 PNA（新生兒）",pnaDays,setPnaDays,"例：7"]].map(([lbl,val,set,ph]) => (
              <div key={lbl}><label style={S.label}>{lbl}</label><input type="number" value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={S.input}/></div>
            ))}
          </div>
          {isNeo && <div style={{ marginTop:10, padding:"6px 10px", background:"rgba(50,160,240,0.07)", border:"1px solid rgba(50,160,240,0.22)", borderRadius:6, fontSize:14, color:"#32a0f0", letterSpacing:1 }}>⬡ 新生兒模式已啟用</div>}
        </div>

        {/* Tab */}
        <div style={{ display:"flex", gap:8, marginBottom:14 }}>
          {[["drug","💊 一般藥物劑量"],["civd","🧪 急救 CIVD 泡法"]].map(([k,lbl]) => (
            <button key={k} onClick={()=>setTab(k)} style={{ flex:1, padding:"11px", borderRadius:8, border:tab===k?"1px solid #32a0f0":"1px solid rgba(255,255,255,0.08)", background:tab===k?"rgba(50,160,240,0.1)":"transparent", color:tab===k?"#7ec8ff":"#506070", fontSize:16, cursor:"pointer", fontFamily:"inherit", letterSpacing:1, fontWeight:tab===k?700:400 }}>{lbl}</button>
          ))}
        </div>

        {/* ══ TAB: 一般藥物 ══ */}
        {tab === "drug" && (
          <>
            <div style={S.card}>
              <div style={S.sectionTitle}>▸ 選擇藥物</div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋藥物..." style={{...S.input,marginBottom:10}}/>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:12 }}>
                {["全部",...CATEGORIES].map(c=><button key={c} onClick={()=>setActiveCat(c)} style={S.tag(activeCat===c)}>{c}</button>)}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))", gap:6 }}>
                {filteredDrugs.map(([k,d])=>(
                  <button key={k} onClick={()=>{setSelDrug(k);setResult(null);}} style={S.drugBtn(selDrug===k)}>
                    <div style={{ fontSize:13, color:selDrug===k?"#32a0f0":"#304050", marginBottom:2 }}>{d.category}</div>
                    {d.name}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={calculate} disabled={!selDrug||!weight} style={S.calcBtn(!selDrug||!weight)}>⬡ 計算劑量</button>
            {result && (
              <div style={{...S.card, marginTop:14, borderColor:"rgba(50,160,240,0.4)"}}>
                <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginBottom:14 }}>
                  <div><div style={S.sectionTitle}>▸ 計算結果</div><div style={{ fontSize:20, fontWeight:700, color:"#b8d8f4" }}>{result.name}</div></div>
                  <div style={{ textAlign:"right" }}><div style={{ fontSize:13, color:"#406080" }}>體重</div><div style={{ fontSize:28, fontWeight:700, color:"#32a0f0" }}>{weight} <span style={{ fontSize:15, color:"#506070" }}>kg</span></div></div>
                </div>
                {result.rows.map((row,i)=>{
                  const isMeningitis = row.label && (row.label.includes("腦膜炎") || row.label.includes("CNS") || row.label.includes("心內膜炎"));
                  const isLoading = row.label && (row.label.includes("Loading") || row.label.includes("loading"));
                  const rowBorderColor = isMeningitis ? "rgba(255,100,100,0.35)" : isLoading ? "rgba(255,180,0,0.35)" : "rgba(50,100,150,0.3)";
                  const labelColor = isMeningitis ? "#ff8080" : isLoading ? "#ffcc60" : "#32a0f0";
                  // parse route for badges
                  const routes = row.route ? row.route.split(/[/,]/).map(r=>r.trim()).filter(Boolean) : [];
                  const routeBadge = (r) => {
                    const col = r==="IV"?"#1a6ea8": r==="IM"?"#4a7a28": r==="PO"?"#7a4a98": r.startsWith("IVD")?"#0e5a8a":"#304050";
                    return <span key={r} style={{ display:"inline-block", padding:"1px 7px", borderRadius:10, background:col, color:"#c8e8ff", fontSize:13, fontWeight:700, marginRight:4, letterSpacing:0.5 }}>{r}</span>;
                  };
                  return (
                  <div key={i} style={{...S.resultRow, borderColor:rowBorderColor, background: isMeningitis?"rgba(255,60,60,0.04)": isLoading?"rgba(255,160,0,0.04)":"rgba(20,40,60,0.4)"}}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:9, flexWrap:"wrap" }}>
                      {isMeningitis && <span style={{ fontSize:12, padding:"1px 6px", background:"rgba(255,80,80,0.2)", color:"#ff8080", borderRadius:8, fontWeight:700, letterSpacing:1 }}>腦膜炎</span>}
                      {isLoading && <span style={{ fontSize:12, padding:"1px 6px", background:"rgba(255,160,0,0.2)", color:"#ffcc60", borderRadius:8, fontWeight:700, letterSpacing:1 }}>LOADING</span>}
                      <div style={{ fontSize:13, color:labelColor, letterSpacing:1.5, fontWeight:600, textTransform:"uppercase", flex:1 }}>{row.label}</div>
                      <div>{routes.map(r=>routeBadge(r))}</div>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:8 }}>
                      {[["每 kg 劑量",row.dose_per_kg,false],["實際劑量",row.total,true],["頻次",row.freq,false]].map(([l,v,h])=>(
                        <div key={l} style={h?S.hl:{}}><div style={{ fontSize:13, color:"#406080", letterSpacing:1, marginBottom:2 }}>{l}</div><div style={{ fontSize:h?14:12, color:h?"#7ec8ff":"#8aa8bc", fontWeight:h?700:400, lineHeight:1.35 }}>{v}</div></div>
                      ))}
                    </div>
                    {row.notes && <div style={S.warn}>⚠ {row.notes}</div>}
                  </div>
                  );
                })}
                <div style={{ fontSize:13, color:"#203040", marginTop:8 }}>⬡ 僅供參考，請依腎功能及臨床狀況調整。</div>
              </div>
            )}
          </>
        )}

        {/* ══ TAB: CIVD 泡法 ══ */}
        {tab === "civd" && (
          <>
            {/* Step 1: 選藥物 */}
            <div style={S.card}>
              <div style={S.sectionTitle}>① 選擇急救藥物</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                {Object.entries(CIVD_DATA).map(([k,d])=>(
                  <button key={k} onClick={()=>onSelectCivd(k)} style={S.pill(selCivd===k)}>{d.name}</button>
                ))}
              </div>
            </div>

            {/* Step 2: 藥物資訊 + 選濃度 */}
            {civdInfo && (
              <div style={S.card}>
                <div style={{ fontSize:18, fontWeight:700, color:"#7ec8ff", marginBottom:4 }}>{civdInfo.name}</div>
                <div style={{ fontSize:15, color:"#506878", marginBottom: civdInfo.loading?8:12 }}>{civdInfo.drug_info}</div>
                {civdInfo.loading && (
                  <div style={{ fontSize:15, color:"#ffcc80", padding:"6px 10px", background:"rgba(255,168,0,0.05)", border:"1px solid rgba(255,168,0,0.2)", borderRadius:6, marginBottom:12 }}>
                    Loading：{civdInfo.loading}
                  </div>
                )}
                <div style={S.sectionTitle}>② 選擇目標濃度（mcg/mL）</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                  {civdInfo.concOptions.map(c => {
                    const isNeoOver = civdInfo.neoMaxConc && c > civdInfo.neoMaxConc && isNeo;
                    return (
                      <button key={c} onClick={()=>onSelectConc(c)} style={{
                        ...S.concBtn(selConc===c),
                        border: isNeoOver ? "1px solid rgba(255,100,100,0.4)" : selConc===c ? "1px solid #32a0f0" : "1px solid rgba(50,160,240,0.2)",
                        color: isNeoOver ? "#ff9090" : selConc===c ? "#7ec8ff" : "#506878",
                        position:"relative",
                      }}>
                        {c.toLocaleString()}
                        {isNeoOver && <span style={{ fontSize:12, color:"#ff7070", display:"block", marginTop:1 }}>超新生兒上限</span>}
                      </button>
                    );
                  })}
                </div>
                {neoWarn && (
                  <div style={{ ...S.warn, marginTop:10 }}>
                    ⚠ 新生兒濃度上限為 {civdInfo.neoMaxConc.toLocaleString()} mcg/mL，目前選擇超過建議範圍
                  </div>
                )}
              </div>
            )}

            {/* Step 3: 輸入 N/S 量 */}
            {selConc && civdInfo && (
              <div style={S.card}>
                <div style={S.sectionTitle}>③ 輸入稀釋液總體積（mL）</div>
                <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                  <div style={{ flex:1, minWidth:160 }}>
                    <label style={S.label}>N/S（或 D5W）加至總體積（mL）</label>
                    <input
                      type="number"
                      value={nsVolume}
                      onChange={e=>{ setNsVolume(e.target.value); setCivdResult(null); }}
                      placeholder="例：50"
                      style={S.input}
                    />
                  </div>
                  {/* Quick preset buttons */}
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:16 }}>
                    {[10,25,50,100,250].map(v=>(
                      <button key={v} onClick={()=>{ setNsVolume(String(v)); setCivdResult(null); }} style={{
                        padding:"6px 12px", borderRadius:6, border: nsVolume==v?"1px solid #32a0f0":"1px solid rgba(50,160,240,0.2)",
                        background: nsVolume==v?"rgba(50,160,240,0.15)":"rgba(50,160,240,0.04)",
                        color: nsVolume==v?"#7ec8ff":"#506878", fontSize:16, cursor:"pointer", fontFamily:"inherit"
                      }}>{v} mL</button>
                    ))}
                  </div>
                </div>
                {civdInfo.note && (
                  <div style={{ ...S.warn, marginTop:10 }}>⚠ {civdInfo.note}</div>
                )}
              </div>
            )}

            {/* Calculate */}
            {selConc && civdInfo && (
              <button onClick={calcCivd} disabled={!bw||!nsVolume} style={S.calcBtn(!bw||!nsVolume)}>
                ⬡ 計算藥物支數 / N/S 用量 / 流速
              </button>
            )}

            {/* Result */}
            {civdResult && civdInfo && (
              <div style={{...S.card, marginTop:14, borderColor:"rgba(50,160,240,0.5)"}}>
                <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginBottom:18 }}>
                  <div>
                    <div style={S.sectionTitle}>▸ 泡藥結果</div>
                    <div style={{ fontSize:20, fontWeight:700, color:"#b8d8f4" }}>{civdInfo.name}</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:13, color:"#406080" }}>體重</div>
                    <div style={{ fontSize:26, fontWeight:700, color:"#32a0f0" }}>{bw} <span style={{ fontSize:15, color:"#506070" }}>kg</span></div>
                  </div>
                </div>

                {/* Big 3-column result */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:14 }}>

                  {/* 藥物量 */}
                  <div style={{ background:"rgba(50,160,240,0.06)", border:"1px solid rgba(50,160,240,0.25)", borderRadius:10, padding:"14px 16px", textAlign:"center" }}>
                    <div style={{ fontSize:13, color:"#32a0f0", letterSpacing:2, marginBottom:6 }}>藥物用量</div>
                    <div style={{ fontSize:32, fontWeight:700, color:"#7ec8ff", lineHeight:1.1 }}>
                      {civdResult.unitsNeeded % 1 === 0 ? civdResult.unitsNeeded.toFixed(0) : civdResult.unitsNeeded.toFixed(2)}
                    </div>
                    <div style={{ fontSize:15, color:"#506878", marginTop:3 }}>{civdInfo.unitLabel}</div>
                    <div style={{ fontSize:14, color:"#406070", marginTop:4 }}>
                      = {civdResult.drugMgNeeded < 1
                        ? `${(civdResult.drugMgNeeded * 1000).toFixed(0)} mcg`
                        : `${civdResult.drugMgNeeded.toFixed(2)} mg`}
                    </div>
                    <div style={{ fontSize:14, color:"#405060", marginTop:2 }}>藥物體積: {civdResult.drugVolMl.toFixed(1)} mL</div>
                  </div>

                  {/* N/S 量 */}
                  <div style={{ background:"rgba(0,180,255,0.05)", border:"1px solid rgba(0,180,255,0.22)", borderRadius:10, padding:"14px 16px", textAlign:"center" }}>
                    <div style={{ fontSize:13, color:"#00c8ff", letterSpacing:2, marginBottom:6 }}>💧 N/S 加入</div>
                    <div style={{ fontSize:32, fontWeight:700, color:"#00e0ff", lineHeight:1.1 }}>
                      {civdResult.nsMl.toFixed(1)}
                    </div>
                    <div style={{ fontSize:15, color:"#506878", marginTop:3 }}>mL</div>
                    <div style={{ fontSize:14, color:"#406070", marginTop:4 }}>
                      總體積: {civdResult.totalVol} mL
                    </div>
                    <div style={{ fontSize:14, color:"#406070", marginTop:2 }}>
                      濃度: {civdResult.concMcgMl.toLocaleString()} mcg/mL
                    </div>
                  </div>

                  {/* 流速 */}
                  <div style={{ background:"rgba(100,255,150,0.04)", border:"1px solid rgba(100,255,150,0.18)", borderRadius:10, padding:"14px 16px", textAlign:"center" }}>
                    <div style={{ fontSize:13, color:"#64ff96", letterSpacing:2, marginBottom:6 }}>流速範圍</div>
                    <div style={{ fontSize:22, fontWeight:700, color:"#a0ffc0", lineHeight:1.2 }}>
                      {civdResult.fLow} – {civdResult.fHigh}
                    </div>
                    <div style={{ fontSize:15, color:"#506878", marginTop:3 }}>mL/hr</div>
                    <div style={{ fontSize:14, color:"#406070", marginTop:4 }}>
                      劑量: {civdInfo.dLow}–{civdInfo.dHigh} {civdInfo.unit}
                    </div>
                    <div style={{ fontSize:14, color:"#406070", marginTop:2 }}>for {bw} kg</div>
                  </div>
                </div>

                {/* Summary sentence */}
                <div style={{ padding:"12px 14px", background:"rgba(50,160,240,0.06)", border:"1px solid rgba(50,160,240,0.15)", borderRadius:8 }}>
                  <div style={{ fontSize:13, color:"#32a0f0", letterSpacing:2, marginBottom:7 }}>泡藥步驟</div>
                  <div style={{ fontSize:16, color:"#9ac8e0", lineHeight:2.0 }}>
                    1. 取 <span style={{ color:"#7ec8ff", fontWeight:700 }}>
                      {civdResult.unitsNeeded % 1 === 0 ? civdResult.unitsNeeded.toFixed(0) : civdResult.unitsNeeded.toFixed(2)} {civdInfo.unitLabel}
                    </span>（= {civdResult.drugVolMl.toFixed(1)} mL）<br/>
                    2. 加入 <span style={{ color:"#00e0ff", fontWeight:700 }}>{civdResult.nsMl.toFixed(1)} mL</span> {civdInfo.name === "Amiodarone" ? "D5W" : "N/S"}<br/>
                    3. 總體積 <span style={{ color:"#fff", fontWeight:700 }}>{civdResult.totalVol} mL</span>，濃度 <span style={{ color:"#32a0f0", fontWeight:700 }}>{civdResult.concMcgMl.toLocaleString()} mcg/mL</span><br/>
                    4. 流速設定 <span style={{ color:"#a0ffc0", fontWeight:700 }}>{civdResult.fLow} – {civdResult.fHigh} mL/hr</span>（{bw} kg，{civdInfo.dLow}–{civdInfo.dHigh} {civdInfo.unit}）
                  </div>
                </div>

                {neoWarn && (
                  <div style={{ ...S.warn, marginTop:10 }}>
                    ⚠ 新生兒濃度上限 {civdInfo.neoMaxConc?.toLocaleString()} mcg/mL，目前 {civdResult.concMcgMl.toLocaleString()} mcg/mL 超出建議範圍
                  </div>
                )}
                {civdInfo.note && (
                  <div style={{ ...S.warn, marginTop:8 }}>⚠ {civdInfo.note}</div>
                )}

                <div style={{ fontSize:13, color:"#1c2a38", marginTop:10, lineHeight:1.7 }}>
                  ⬡ 本結果僅供參考，請依藥物仿單及臨床狀況調整。來源：雙和醫院兒科藥劑部 2025 版。
                </div>
              </div>
            )}
          </>
        )}
      </div>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
        * { box-sizing: border-box; }
        input::placeholder { color: #1e2e3e; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(50,160,240,0.3); border-radius: 2px; }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
